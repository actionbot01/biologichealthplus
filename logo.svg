<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" fill="none">
  <!-- Animated DNA helix icon -->
  <rect x="0" y="3" width="50" height="50" rx="12" fill="url(#grad1)"/>

  <!-- Cross/plus mark -->
  <rect x="22" y="10" width="6" height="36" rx="3" fill="white"/>
  <rect x="11" y="21" width="28" height="8" rx="3" fill="white" opacity="0.9"/>

  <!-- Green pill badge -->
  <rect x="28" y="33" width="22" height="14" rx="7" fill="#10B981"/>
  <text x="31" y="43.5" font-family="Arial Black,sans-serif" font-size="8" font-weight="900" fill="white">+</text>

  <!-- Wordmark: Biologic -->
  <text x="60" y="26" font-family="Arial Black,sans-serif" font-size="18" font-weight="900" fill="#0066CC">Biologic</text>
  <!-- Health in dark -->
  <text x="155" y="26" font-family="Arial Black,sans-serif" font-size="18" font-weight="900" fill="#1F2937">Health</text>
  <!-- Plus in green -->
  <text x="254" y="26" font-family="Arial Black,sans-serif" font-size="18" font-weight="900" fill="#10B981">Plus</text>

  <!-- Tagline -->
  <text x="60" y="42" font-family="Arial,sans-serif" font-size="7" font-weight="700" fill="#9CA3AF" letter-spacing="2.2">SPECIALTY BIOLOGIC PHARMACY</text>

  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="50" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0052a3"/>
      <stop offset="100%" stop-color="#0066CC"/>
    </linearGradient>
  </defs>
</svg>
